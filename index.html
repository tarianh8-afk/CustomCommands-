<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Commands</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f0b06;
  --card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);

  --orange:#ff7a18;
  --yellow:#ffd54a;
  --white:#ffffff;
  --muted:#c9b38c;
  --red:#ff4d4d;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at top,#1a1208 0%,#0f0b06 70%);
  color:var(--white);
}

/* Layout */
.wrapper{
  max-width:820px;
  margin:auto;
  padding:40px 18px 60px;
}

/* HEADER */
.header{
  padding:24px;
  border-radius:18px;
  background:var(--card);
  backdrop-filter:blur(12px);
  border:1px solid var(--border);
  margin-bottom:35px;
}

.header-top{
  display:flex;
  align-items:center;
  gap:10px;
}

.status-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--orange);
}

h1{
  margin:0;
  font-size:22px;
  font-weight:600;
}

.timer{
  margin-top:10px;
  font-size:14px;
  font-weight:500;
  color:var(--muted);
}

/* CARDS */
.card{
  padding:22px;
  border-radius:18px;
  background:var(--card);
  backdrop-filter:blur(12px);
  border:1px solid var(--border);
  margin-bottom:22px;
  transition:.3s ease;
}

.card:hover{
  transform:translateY(-3px);
}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.service-name{
  font-size:17px;
  font-weight:600;
}

/* Badge */
.badge{
  font-size:12px;
  padding:5px 14px;
  border-radius:50px;
  font-weight:500;
  border:1px solid;
}

.badge.active{
  color:var(--orange);
  border-color:var(--orange);
}

.badge.maintenance{
  color:var(--yellow);
  border-color:var(--yellow);
}

.badge.offline{
  color:var(--red);
  border-color:var(--red);
}

.badge.beta{
  color:var(--white);
  border-color:var(--white);
}

/* Progress */
.progress{
  height:8px;
  background:rgba(255,255,255,0.05);
  border-radius:50px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  border-radius:50px;
  background:linear-gradient(90deg,var(--orange),var(--yellow));
  transition:width 1s ease;
}

.percent{
  margin-top:8px;
  font-size:13px;
  color:var(--muted);
}

/* MOBILE */
@media(max-width:480px){
  .wrapper{padding:30px 14px}
  h1{font-size:19px}
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
  <div class="header-top">
    <div class="status-dot"></div>
    <h1>Custom Commands</h1>
  </div>
  <div class="timer" id="timer">Established: 0d 0h 0m 0s</div>
</div>

<div id="services"></div>

</div>

<script>

const services=[
  {name:"Command Engine",percent:0,status:"offline",label:"Down"},
  {name:"Moderation Tools",percent:80,status:"active",label:"Operational"},
  {name:"Automation System",percent:55,status:"maintenance",label:"Updating"},
  {name:"Beta Commands",percent:35,status:"beta",label:"Beta"}
];

function render(){
  const container=document.getElementById("services");
  services.forEach(service=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div class="card-top">
        <div class="service-name">${service.name}</div>
        <div class="badge ${service.status}">${service.label}</div>
      </div>
      <div class="progress">
        <div class="progress-bar" style="width:${service.percent}%"></div>
      </div>
      <div class="percent">${service.percent}%</div>
    `;
    container.appendChild(card);
  });
}

render();

/* TIMER */
const startDate=new Date("2026-01-01T00:00:00Z");

function updateTimer(){
  const now=new Date();
  const diff=now-startDate;
  const d=Math.floor(diff/(1000*60*60*24));
  const h=Math.floor((diff/(1000*60*60))%24);
  const m=Math.floor((diff/(1000*60))%60);
  const s=Math.floor((diff/1000)%60);
  document.getElementById("timer").textContent=
  `Established: ${d}d ${h}h ${m}m ${s}s`;
}

setInterval(updateTimer,1000);
updateTimer();

</script>

</body>
</html>
