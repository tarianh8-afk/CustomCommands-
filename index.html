<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Commands</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --orange:#ff7a18;
  --yellow:#ffd54a;
  --bg:#0f0b06;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:white;
  overflow-x:hidden;
}

/* PARTICLES */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* WRAPPER */
.wrapper{
  max-width:750px;
  margin:auto;
  padding:40px 20px 80px;
}

/* HEADER */
.header{
  padding:25px;
  border-radius:18px;
  background:rgba(255,122,24,0.08);
  border:1px solid rgba(255,122,24,0.25);
  margin-bottom:30px;
}

.header-top{
  display:flex;
  align-items:center;
  gap:12px;
}

.status-dot{
  width:14px;
  height:14px;
  border-radius:50%;
  background:var(--orange);
  position:relative;
  box-shadow:0 0 12px var(--orange);
}
.status-dot::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  background:inherit;
  animation:ripple 2.5s ease-out infinite;
}
@keyframes ripple{
  0%{transform:scale(1);opacity:.6}
  70%{transform:scale(2.5);opacity:0}
  100%{opacity:0}
}

h1{margin:0;font-size:22px}

.timer{
  margin-top:10px;
  color:var(--yellow);
  font-weight:600;
}

/* CARDS */
.card{
  padding:22px;
  border-radius:18px;
  background:rgba(255,122,24,0.06);
  border:1px solid rgba(255,122,24,0.2);
  margin-bottom:20px;
  transition:.3s;
}
.card:hover{
  box-shadow:0 0 25px rgba(255,122,24,.3);
}

.card-top{
  display:flex;
  justify-content:space-between;
  margin-bottom:14px;
  align-items:center;
}

.badge{
  font-size:12px;
  padding:6px 14px;
  border-radius:40px;
  border:1px solid var(--orange);
  color:var(--orange);
}

.progress{
  height:8px;
  background:rgba(255,255,255,0.05);
  border-radius:40px;
  overflow:hidden;
}
.progress-bar{
  height:100%;
  background:linear-gradient(90deg,var(--orange),var(--yellow));
  border-radius:40px;
  position:relative;
}
.progress-bar::after{
  content:"";
  position:absolute;
  top:0;
  left:-50%;
  width:40%;
  height:100%;
  background:linear-gradient(120deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,.8) 50%,
    rgba(255,255,255,0) 100%);
  animation:shine 5s linear infinite;
}
@keyframes shine{
  from{left:-50%}
  to{left:150%}
}

.percent{
  margin-top:8px;
  font-size:14px;
  color:#ddd;
}

/* ADMIN BUTTON */
.admin-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--orange);
  border:none;
  padding:12px 18px;
  border-radius:50px;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,122,24,.5);
}

/* ADMIN MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:flex;
  align-items:center;
  justify-content:center;
  visibility:hidden;
  opacity:0;
  transition:.3s;
}
.modal.active{
  visibility:visible;
  opacity:1;
}

.modal-box{
  width:90%;
  max-width:420px;
  background:#1a120a;
  padding:30px;
  border-radius:20px;
  border:1px solid var(--orange);
  text-align:center;
}

.modal-box input{
  width:100%;
  padding:12px;
  margin:15px 0;
  background:#222;
  border:1px solid #444;
  color:white;
  border-radius:10px;
}

.modal-box button{
  width:100%;
  padding:12px;
  background:var(--orange);
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="wrapper">
  <div class="header">
    <div class="header-top">
      <div class="status-dot"></div>
      <h1>Custom Commands</h1>
    </div>
    <div class="timer" id="timer"></div>
  </div>

  <div id="services"></div>
</div>

<button class="admin-btn" onclick="openModal()">Admin</button>

<div class="modal" id="modal">
  <div class="modal-box">
    <h2 style="color:var(--orange)">Admin Access</h2>
    <input type="password" id="pass" placeholder="Enter Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<script>
const PASSWORD="nova123";

let services=[
  {name:"Command Engine",percent:0,badge:"Down"},
  {name:"Moderation Tools",percent:80,badge:"Operational"},
  {name:"Automation System",percent:55,badge:"Updating"},
  {name:"Beta Commands",percent:35,badge:"Beta"}
];

function render(){
  const container=document.getElementById("services");
  container.innerHTML="";
  services.forEach(s=>{
    container.innerHTML+=`
    <div class="card">
      <div class="card-top">
        <div>${s.name}</div>
        <div class="badge">${s.badge}</div>
      </div>
      <div class="progress">
        <div class="progress-bar" style="width:${s.percent}%"></div>
      </div>
      <div class="percent">${s.percent}%</div>
    </div>`;
  });
}
render();

/* Timer */
const start=new Date("2026-01-01T00:00:00Z");
setInterval(()=>{
  const diff=new Date()-start;
  const d=Math.floor(diff/86400000);
  const h=Math.floor(diff/3600000)%24;
  const m=Math.floor(diff/60000)%60;
  const s=Math.floor(diff/1000)%60;
  document.getElementById("timer").textContent=
  `Established: ${d}d ${h}h ${m}m ${s}s`;
},1000);

/* Admin Modal */
function openModal(){
  document.getElementById("modal").classList.add("active");
}
function login(){
  if(document.getElementById("pass").value===PASSWORD){
    alert("Access Granted (Admin panel can be expanded next)");
    document.getElementById("modal").classList.remove("active");
  }
}

/* PARTICLES */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize();addEventListener("resize",resize);

let particles=[];
for(let i=0;i<60;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    dx:(Math.random()-.5)*.4,
    dy:(Math.random()-.5)*.4
  });
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.dx;p.y+=p.dy;
    if(p.x<0||p.x>canvas.width)p.dx*=-1;
    if(p.y<0||p.y>canvas.height)p.dy*=-1;
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="rgba(255,140,50,.7)";
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
